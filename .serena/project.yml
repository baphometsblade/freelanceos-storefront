# the name by which the project can be referenced within Serena
project_name: "markm"

# language servers to start. REQUIRED -- Serena crashes with KeyError: 'languages' without it.
languages:
- typescript
- html

encoding: "utf-8"
line_ending: "crlf"
ignore_all_files_in_gitignore: true

ignored_paths:
- node_modules
- .vercel
- ".git"
- "*.log"
- ".env"
- ".env.*"
- OneDrive
- youtube-pipeline
- "*.pdf"
- "*.zip"
- "*.png"
- "*.jpg"

read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []

default_modes:
added_modes:
symbol_info_budget:
language_backend:
read_only_memory_patterns: []
ignored_memory_patterns: []
ls_specific_settings: {}
additional_workspace_folders: []
