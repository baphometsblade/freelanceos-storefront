<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreelanceOS Pinterest Pin Design Kit — 20 Ready-to-Save Pins</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
header{background:#1a1a1a;border-bottom:3px solid #7c3aed;padding:2rem;text-align:center}
header h1{font-size:2.2rem;font-weight:800;color:#fff;margin-bottom:.5rem}
header p{color:#9ca3af;font-size:1.1rem;margin-bottom:1rem}
.dl-all{background:#7c3aed;color:#fff;border:none;padding:.8rem 2rem;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.dl-all:hover{background:#6d28d9}
.tabs{display:flex;gap:.5rem;padding:1.5rem 2rem;flex-wrap:wrap;background:#111}
.tab{background:#1a1a1a;color:#9ca3af;border:1px solid #333;padding:.5rem 1.2rem;border-radius:20px;cursor:pointer;font-size:.9rem;transition:all .2s}
.tab.active,.tab:hover{background:#7c3aed;color:#fff;border-color:#7c3aed}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;padding:2rem;max-width:1600px;margin:0 auto}
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.pin-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;overflow:hidden;transition:all .2s}
.pin-card:hover{border-color:#7c3aed;box-shadow:0 0 20px rgba(124,58,237,.3)}
.pin-card.hidden{display:none}
.pin-svg{width:100%;aspect-ratio:2/3;display:block}
.pin-svg svg{width:100%;height:100%}
.pin-info{padding:1rem}
.pin-info h3{font-size:.85rem;font-weight:600;color:#e5e7eb;margin-bottom:.8rem;line-height:1.3}
.save-btn{background:#7c3aed;color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;width:100%;transition:background .2s;margin-bottom:.5rem}
.save-btn:hover{background:#6d28d9}
.caption-toggle{background:transparent;color:#9ca3af;border:1px solid #333;padding:.4rem 1rem;border-radius:6px;font-size:.75rem;cursor:pointer;width:100%;transition:all .2s}
.caption-toggle:hover{border-color:#7c3aed;color:#7c3aed}
.caption-panel{display:none;background:#111;border-radius:6px;padding:.8rem;margin-top:.5rem;font-size:.75rem;color:#9ca3af;line-height:1.6}
.caption-panel.open{display:block}
.caption-panel strong{color:#e5e7eb;display:block;margin-bottom:.3rem}
.caption-panel .hashtags{color:#7c3aed;margin-top:.4rem;word-break:break-all}
.caption-panel .board{color:#f59e0b;margin-top:.3rem}
.caption-panel .copy-btn{background:#1a1a1a;color:#e5e7eb;border:1px solid #333;padding:.3rem .8rem;border-radius:4px;font-size:.7rem;cursor:pointer;margin-top:.5rem}
.how-to{background:#1a1a1a;border-top:1px solid #2a2a2a;padding:3rem 2rem;max-width:900px;margin:0 auto}
.how-to h2{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:1.5rem;text-align:center}
.steps{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(max-width:600px){.steps{grid-template-columns:1fr}}
.step{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:1rem}
.step-num{font-size:1.5rem;font-weight:900;color:#7c3aed;margin-bottom:.3rem}
.step p{font-size:.85rem;color:#9ca3af;line-height:1.5}
footer{text-align:center;padding:2rem;color:#4b5563;font-size:.85rem}
footer a{color:#7c3aed;text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>📌 FreelanceOS Pinterest Kit</h1>
  <p>20 ready-to-save Pinterest pin designs — click any pin to download as PNG</p>
  <button class="dl-all" onclick="downloadAll()">⬇ Download All 20 Pins</button>
</header>
<div class="tabs">
  <button class="tab active" onclick="filterPins('all',this)">All Pins (20)</button>
  <button class="tab" onclick="filterPins('freelanceos',this)">FreelanceOS Pro</button>
  <button class="tab" onclick="filterPins('creatorhq',this)">CreatorHQ</button>
  <button class="tab" onclick="filterPins('agencyos',this)">AgencyOS</button>
  <button class="tab" onclick="filterPins('youtube',this)">YouTube Empire</button>
</div>
<div class="grid" id="pinGrid">
