name = "freelanceos-webhook"
main = "worker.js"
compatibility_date = "2024-09-23"

# ---------------------------------------------------------------------------
# D1 Database binding
# Run `wrangler d1 create freelanceos-deliveries` to create the database,
# then paste the returned database_id below.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "freelanceos-deliveries"
database_id = "e880dc80-43ea-41c9-9f02-562f8ccc7711"

# ---------------------------------------------------------------------------
# Secrets — set via CLI, never stored in this file:
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_SECRET_KEY
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# (Optional) Production environment override
# ---------------------------------------------------------------------------
[env.production]
name = "freelanceos-webhook"
# Production-specific vars can be added here if needed
