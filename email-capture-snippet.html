<!--
  FreelanceOS Email Capture Modal Snippet
  Drop this anywhere before </body>. Call openEmailModal() to trigger it.
  Self-contained — no external dependencies beyond Inter font (optional).
-->

<!-- MODAL OVERLAY -->
<div id="flos-modal-overlay" style="display:none;" aria-modal="true" role="dialog" aria-labelledby="flos-modal-title">
  <div id="flos-modal-box">
    <button id="flos-modal-close" aria-label="Close">&times;</button>

    <div id="flos-modal-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#7c3aed"/>
        <path d="M7 10h14M7 14h10M7 18h7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>

    <h2 id="flos-modal-title">Get your free template + a 5-day setup guide</h2>
    <p id="flos-modal-sub">We'll send you the Notion link plus tips on getting the most out of it. No spam, unsubscribe anytime.</p>

    <form id="flos-capture-form" novalidate>
      <div id="flos-input-wrap">
        <input
          type="email"
          id="flos-email-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
          aria-label="Your email address"
        />
      </div>
      <div id="flos-error-msg" role="alert" style="display:none;"></div>
      <button type="submit" id="flos-submit-btn">
        <span id="flos-btn-text">Send me the template &rarr;</span>
        <span id="flos-btn-spinner" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" class="flos-spin">
            <circle cx="9" cy="9" r="7" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
            <path d="M9 2a7 7 0 0 1 7 7" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>
    </form>

    <button id="flos-skip-btn" type="button">Skip, just give me the link &rarr;</button>

    <p id="flos-trust-line">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:-1px">
        <circle cx="6" cy="6" r="5" fill="none" stroke="#10b981" stroke-width="1.3"/>
        <path d="M3.5 6l1.5 1.5L8.5 4" stroke="#10b981" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      &nbsp;Joining 1,200+ freelancers already using FreelanceOS
    </p>
  </div>
</div>

<style>
  /* ── Reset scope ── */
  #flos-modal-overlay *,
  #flos-modal-overlay *::before,
  #flos-modal-overlay *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  /* ── Overlay ── */
  #flos-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 15, 0.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 99999;
    display: flex !important;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: flos-fade-in 0.2s ease;
  }

  #flos-modal-overlay.flos-hidden {
    display: none !important;
  }

  @keyframes flos-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes flos-slide-up {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes flos-spin {
    to { transform: rotate(360deg); }
  }

  .flos-spin { animation: flos-spin 0.7s linear infinite; }

  /* ── Modal box ── */
  #flos-modal-box {
    background: #0f172a;
    border: 1px solid rgba(124, 58, 237, 0.35);
    border-radius: 16px;
    padding: 40px 36px 32px;
    width: 100%;
    max-width: 460px;
    position: relative;
    animation: flos-slide-up 0.25s ease;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(124,58,237,0.1);
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: #f0eeff;
  }

  /* ── Close button ── */
  #flos-modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    color: #5a5473;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    font-family: inherit;
  }

  #flos-modal-close:hover {
    color: #f0eeff;
    background: rgba(255,255,255,0.06);
  }

  /* ── Icon ── */
  #flos-modal-icon {
    margin-bottom: 18px;
  }

  /* ── Headline ── */
  #flos-modal-title {
    font-size: 1.35rem;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: #f0eeff;
    margin-bottom: 10px;
  }

  /* ── Sub-text ── */
  #flos-modal-sub {
    font-size: 0.9rem;
    color: #8b84a8;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* ── Form ── */
  #flos-capture-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #flos-input-wrap {
    position: relative;
  }

  #flos-email-input {
    width: 100%;
    padding: 13px 16px;
    background: #161628;
    border: 1px solid #1e1e35;
    border-radius: 10px;
    color: #f0eeff;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #flos-email-input::placeholder { color: #5a5473; }

  #flos-email-input:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
  }

  #flos-email-input.flos-input-error {
    border-color: #ef4444;
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
  }

  /* ── Error message ── */
  #flos-error-msg {
    font-size: 0.82rem;
    color: #ef4444;
    padding: 0 2px;
  }

  /* ── Submit button ── */
  #flos-submit-btn {
    width: 100%;
    padding: 13px 20px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 48px;
  }

  #flos-submit-btn:hover:not(:disabled) {
    background: #9d65f5;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
  }

  #flos-submit-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  /* ── Skip link ── */
  #flos-skip-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: #5a5473;
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    padding: 8px 0 4px;
    text-align: center;
    transition: color 0.15s;
    text-decoration: underline;
    text-decoration-color: transparent;
    text-underline-offset: 2px;
  }

  #flos-skip-btn:hover {
    color: #8b84a8;
    text-decoration-color: #8b84a8;
  }

  /* ── Trust line ── */
  #flos-trust-line {
    margin-top: 16px;
    font-size: 0.78rem;
    color: #5a5473;
    text-align: center;
    line-height: 1.4;
  }

  /* ── Success state ── */
  #flos-modal-box.flos-success #flos-capture-form,
  #flos-modal-box.flos-success #flos-skip-btn,
  #flos-modal-box.flos-success #flos-modal-sub,
  #flos-modal-box.flos-success #flos-trust-line {
    display: none;
  }

  #flos-success-msg {
    display: none;
    text-align: center;
    padding: 8px 0 4px;
  }

  #flos-modal-box.flos-success #flos-success-msg {
    display: block;
  }

  #flos-success-msg p:first-child {
    font-size: 2.2rem;
    margin-bottom: 12px;
  }

  #flos-success-msg h3 {
    font-size: 1.15rem;
    font-weight: 800;
    color: #f0eeff;
    margin-bottom: 8px;
  }

  #flos-success-msg p.flos-success-sub {
    font-size: 0.875rem;
    color: #8b84a8;
    margin-bottom: 20px;
    line-height: 1.55;
  }

  #flos-success-redirect-btn {
    display: inline-block;
    padding: 11px 22px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  #flos-success-redirect-btn:hover { background: #9d65f5; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    #flos-modal-box {
      padding: 32px 20px 24px;
    }
    #flos-modal-title { font-size: 1.15rem; }
  }
</style>

<!-- Success state (hidden until form submits) -->
<script>
(function () {
  'use strict';

  // ── Config ──────────────────────────────────────────────────────────────────
  var API_ENDPOINT   = 'https://freelanceos-api.vercel.app/api/capture-email';
  var REDIRECT_URL   = 'https://www.notion.so/templates/freelanceos-free';
  var PRODUCT_ID     = 'free-tier';
  // ────────────────────────────────────────────────────────────────────────────

  var overlay    = document.getElementById('flos-modal-overlay');
  var box        = document.getElementById('flos-modal-box');
  var closeBtn   = document.getElementById('flos-modal-close');
  var form       = document.getElementById('flos-capture-form');
  var emailInput = document.getElementById('flos-email-input');
  var errorMsg   = document.getElementById('flos-error-msg');
  var submitBtn  = document.getElementById('flos-submit-btn');
  var btnText    = document.getElementById('flos-btn-text');
  var btnSpinner = document.getElementById('flos-btn-spinner');
  var skipBtn    = document.getElementById('flos-skip-btn');

  // ── Inject success markup ────────────────────────────────────────────────
  var successDiv = document.createElement('div');
  successDiv.id = 'flos-success-msg';
  successDiv.innerHTML =
    '<p>&#127881;</p>' +
    '<h3>Check your inbox!</h3>' +
    '<p class="flos-success-sub">Your Notion template link is on its way. Keep an eye out for the 5-day setup guide too.</p>' +
    '<button id="flos-success-redirect-btn">Open Notion template &rarr;</button>';
  box.appendChild(successDiv);

  document.getElementById('flos-success-redirect-btn').addEventListener('click', function () {
    window.location.href = REDIRECT_URL;
  });

  // ── Helpers ─────────────────────────────────────────────────────────────
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email.trim());
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    emailInput.classList.add('flos-input-error');
  }

  function clearError() {
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
    emailInput.classList.remove('flos-input-error');
  }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    btnText.style.display   = loading ? 'none'   : 'inline';
    btnSpinner.style.display = loading ? 'inline' : 'none';
  }

  function redirectToTemplate() {
    window.location.href = REDIRECT_URL;
  }

  function showSuccess() {
    box.classList.add('flos-success');
    // Auto-redirect after 3 seconds
    setTimeout(redirectToTemplate, 3000);
  }

  // ── Open / Close ────────────────────────────────────────────────────────
  function openModal() {
    overlay.classList.remove('flos-hidden');
    overlay.style.display = 'flex';
    emailInput.value = '';
    clearError();
    box.classList.remove('flos-success');
    setLoading(false);
    setTimeout(function () { emailInput.focus(); }, 100);
  }

  function closeModal() {
    overlay.classList.add('flos-hidden');
    overlay.style.display = 'none';
  }

  // Expose globally so any button can call it
  window.openEmailModal = openModal;

  // ── Event listeners ─────────────────────────────────────────────────────
  closeBtn.addEventListener('click', closeModal);

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !overlay.classList.contains('flos-hidden')) {
      closeModal();
    }
  });

  skipBtn.addEventListener('click', redirectToTemplate);

  emailInput.addEventListener('input', function () {
    if (errorMsg.style.display !== 'none') clearError();
  });

  // ── Form submit ─────────────────────────────────────────────────────────
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearError();

    var email = emailInput.value.trim();

    if (!email) {
      showError('Please enter your email address.');
      emailInput.focus();
      return;
    }

    if (!isValidEmail(email)) {
      showError('That doesn\'t look like a valid email. Please double-check.');
      emailInput.focus();
      return;
    }

    setLoading(true);

    var payload = {
      email:   email,
      product: PRODUCT_ID,
      source:  window.location.pathname
    };

    fetch(API_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function (res) {
      // Accept any 2xx as success; don't block user on API errors
      if (res.ok) {
        showSuccess();
      } else {
        return res.json().then(function (data) {
          throw new Error(data.message || 'Server error');
        });
      }
    })
    .catch(function (err) {
      // Soft-fail: log the error but still show success so the user gets the template
      console.warn('[FreelanceOS email capture] API error:', err.message);
      showSuccess();
    })
    .finally(function () {
      setLoading(false);
    });
  });

  // ── Auto-wire any existing "Get Free Template" buttons ───────────────────
  // Runs after DOM is ready; call wireFreeBtns() again if you add buttons dynamically.
  function wireFreeBtns() {
    var selectors = [
      'a[href*="notion.so/templates"]',
      'a[href*="stripe.com"][data-free]',
      '.flos-trigger',
      '[data-email-modal]'
    ];
    selectors.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el) {
        if (el.dataset.flosWired) return; // prevent double-binding
        el.dataset.flosWired = 'true';
        el.addEventListener('click', function (e) {
          e.preventDefault();
          openModal();
        });
      });
    });
  }

  window.wireFreeTemplateButtons = wireFreeBtns;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', wireFreeBtns);
  } else {
    wireFreeBtns();
  }

})();
</script>
